description: |
    Axis alignment specification for sensors
    that require orientation.

    Example:
    #include <zephyr/dt-bindings/sensor/icm42688.h>

    icm42688: icm42688@0 {
      ...
      axis-align-x = <ALIGN_NEG_X>
      accel-pwr-mode = <ICM42688_DT_ACCEL_LN>;
      accel-fs = <ICM42688_DT_ACCEL_FS_16>;
      accel-odr = <ICM42688_DT_ACCEL_ODR_2000>;
      gyro-pwr-mode= <ICM42688_DT_GYRO_LN>;
      gyro-fs = <ICM42688_DT_GYRO_FS_2000>;
      gyro-odr = <ICM42688_DT_GYRO_ODR_2000>;
    };
compatible: "invensense,icm42688"
include: [sensor-axis-align.yaml, sensor-device.yaml, spi-device.yaml]

properties:

  axis-align-x:
    type: int
    default: 0
    description: |
      Align sensor chanel x output with hardware orientation axis.
      Defaults to positive x.
    enum:
      - 0 # ALIGN_DEFAULT
      - 1 # ALIGN_POS_X
      - 2 # ALIGN_POS_Y
      - 3 # ALIGN_POS_Z
      - 4 # ALIGN_NEG_X
      - 5 # ALIGN_NEG_Y
      - 6 # ALIGN_NEG_Z
  
  axis-align-y:
    type: int
    default: 0
    description: |
      Align sensor chanel y output with hardware orientation axis.
      Defaults to positive y.
    enum:
      - 0 # ALIGN_DEFAULT
      - 1 # ALIGN_POS_X
      - 2 # ALIGN_POS_Y
      - 3 # ALIGN_POS_Z
      - 4 # ALIGN_NEG_X
      - 5 # ALIGN_NEG_Y
      - 6 # ALIGN_NEG_Z
  
  axis-align-z:
    type: int
    default: 0
    description: |
      Align sensor chanel z output with hardware orientation axis.
      Defaults to positive z.
    enum:
      - 0 # ALIGN_DEFAULT
      - 1 # ALIGN_POS_X
      - 2 # ALIGN_POS_Y
      - 3 # ALIGN_POS_Z
      - 4 # ALIGN_NEG_X
      - 5 # ALIGN_NEG_Y
      - 6 # ALIGN_NEG_Z
