description: |
    Axis alignment specification for sensors
    that require orientation.

    Example:
    #include <zephyr/dt-bindings/sensor/icm42688.h>

    icm42688: icm42688@0 {
      ...
      axis-align-x = <ALIGN_NEG_X>
      accel-pwr-mode = <ICM42688_DT_ACCEL_LN>;
      accel-fs = <ICM42688_DT_ACCEL_FS_16>;
      accel-odr = <ICM42688_DT_ACCEL_ODR_2000>;
      gyro-pwr-mode= <ICM42688_DT_GYRO_LN>;
      gyro-fs = <ICM42688_DT_GYRO_FS_2000>;
      gyro-odr = <ICM42688_DT_GYRO_ODR_2000>;
    };

include: base.yaml
properties:
  axis-align-x:
    type: int
    default: 0
    description: |
      Align sensor chanel x output with hardware orientation axis.
      Defaults to x.
    enum:
      - 0 # SENSOR_AXIS_ALIGN_DT_X
      - 1 # SENSOR_AXIS_ALIGN_DT_Y
      - 2 # SENSOR_AXIS_ALIGN_DT_Z

  axis-align-x-sign:
    type: int
    default: 2
    description: |
      Align sensor chanel x output with hardware orientation axis sign component.
      Defaults to positive.
    enum:
      - 0 # SENSOR_AXIS_ALIGN_DT_NEG
      - 2 # SENSOR_AXIS_ALIGN_DT_POS
  
  axis-align-y:
    type: int
    default: 1
    description: |
      Align sensor chanel y output with hardware orientation axis.
      Defaults to y.
    enum:
      - 0 # SENSOR_AXIS_ALIGN_DT_X
      - 1 # SENSOR_AXIS_ALIGN_DT_Y
      - 2 # SENSOR_AXIS_ALIGN_DT_Z

  axis-align-y-sign:
    type: int
    default: 2
    description: |
      Align sensor chanel y output with hardware orientation axis sign component.
      Defaults to positive.
    enum:
      - 0 # SENSOR_AXIS_ALIGN_DT_NEG
      - 2 # SENSOR_AXIS_ALIGN_DT_POS
  
  axis-align-z:
    type: int
    default: 2
    description: |
      Align sensor chanel z output with hardware orientation axis.
      Defaults to z.
    enum:
      - 0 # SENSOR_AXIS_ALIGN_DT_X
      - 1 # SENSOR_AXIS_ALIGN_DT_Y
      - 2 # SENSOR_AXIS_ALIGN_DT_Z

  axis-align-z-sign:
    type: int
    default: 2
    description: |
      Align sensor chanel z output with hardware orientation axis sign component.
      Defaults to positive.
    enum:
      - 0 # SENSOR_AXIS_ALIGN_DT_NEG
      - 2 # SENSOR_AXIS_ALIGN_DT_POS

